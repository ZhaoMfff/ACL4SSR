[custom]
;不要随意改变关键字，否则会导致出错
;个性化手机配置 - 自动US分组+Clean/AI指定默认逻辑

;=========================================================
; 1. 规则集定义 (Rulesets)
;=========================================================
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list

; 核心AI服务规则
ruleset=✨ Gemini,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleGemini.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Claude.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Copilot.list

; 常用服务规则
ruleset=🔍 谷歌服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🐦 推特/X,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Twitter.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Steam.list
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🎶 网易音乐,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/NetEaseMusic.list

; 兜底规则
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL


;设置分组标志位
;=========================================================
; 2. 核心分组定义 (US / Clean / Speed)
;=========================================================

; [🧩 US] - 核心源头 (自动测速)
; 抓取所有带 US/美国 关键字的节点，自动选最快
custom_proxy_group=🧩 US`url-test`(US|🇺🇸|United States|美|America|Los|Ord|BUF)`http://www.gstatic.com/generate_204`300,,50

; [🧩 Clean] - 默认选中 US
; 逻辑：[]🧩 US 排第一，所以默认走 US
; 允许手动切换到：节点选择、直连
custom_proxy_group=🧩 Clean`select`[]🧩 US`[]🚀 节点选择`[]DIRECT

; [🧩 速度] - 默认选中 US
; 逻辑：[]🧩 US 排第一，所以默认走 US
; 允许手动切换到：自动选择、香港、美国
custom_proxy_group=🧩 速度`select`[]🧩 US`[]⚡ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 节点选择`[]DIRECT

;=========================================================
; 3. 功能性分组 (指定默认指向)
;=========================================================

; [✨ Gemini] -> 默认指向 US
; 需求：默认走 US 组
custom_proxy_group=✨ Gemini`select`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT

; [🤖 AI 服务] -> 默认指向 Clean
; 需求：默认走 Clean 组 (而 Clean 组默认走 US，形成套娃)
custom_proxy_group=🤖 AI 服务`select`[]🧩 Clean`[]🧩 US`[]🧩 速度`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT

; [🔍 谷歌服务] -> 默认指向 US
custom_proxy_group=🔍 谷歌服务`select`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT

; [📹 油管视频] -> 默认指向 US
custom_proxy_group=📹 油管视频`select`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT

; [📲 电报消息] -> 默认指向 节点选择 (常规逻辑)
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]🧩 US`[]⚡ 自动选择`[]DIRECT

; [🐦 推特/X] -> 默认指向 节点选择
custom_proxy_group=🐦 推特/X`select`[]🚀 节点选择`[]🧩 US`[]⚡ 自动选择`[]DIRECT

; 其他服务 -> 默认指向 直连 或 节点选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点
custom_proxy_group=🎥 奈飞视频`select`[]🎥 奈飞节点`[]🚀 节点选择`[]🧩 US`[]DIRECT
custom_proxy_group=🎮 游戏平台`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点

;=========================================================
; 4. 基础分组 (地域/自动/手动)
;=========================================================

; [🚀 节点选择] - 主手动组
custom_proxy_group=🚀 节点选择`select`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🚀 手动切换`[]DIRECT

; [⚡ 自动选择] - 包含所有节点
custom_proxy_group=⚡ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 地域自动组 (正则抓取)
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|hk|Hong Kong|HongKong|hongkong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇸🇬 狮城节点`url-test`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国节点`url-test`(KR|Korea|KOR|首尔|韩|韓)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎥 奈飞节点`select`(NF|奈飞|解锁|Netflix|NETFLIX|Media)

; 杂项
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]🧩 US

;通用设置
enable_rule_generator=true
overwrite_original_rules=true