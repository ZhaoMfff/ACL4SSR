; ===================================================================
; 2. 策略组定义 (Proxy Groups) - 三层架构设计
; 排除正则说明: ^(?!(?i)cf - |.*(?:关键词1|关键词2)).* 代表严格剔除这些节点
; ===================================================================

; ---------------------------------------------------
; [底层] 节点筛选与测试 (直接抓取机场节点，不嵌套其他分组)
; ---------------------------------------------------
; 1. US 组 (地区筛选，允许包含 CF 节点)
custom_proxy_group=🇺🇸 US`select`(?i)(US|🇺🇸|United States|美|America)

; 2. 青蛙节点 (特定节点自动测速)
custom_proxy_group=🐸 青蛙`url-test`(?i)FL-frog`http://www.gstatic.com/generate_204`900`100

; 3. 速度组 (全节点列表，严格排除 "cf - " 及 官网/到期 等无效节点)
custom_proxy_group=🧩 速度`select`^(?!(?i)cf - |.*(?:官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)).*

; 4. Clean 组 (纯净美国节点，排除 "cf - " 及无效节点，末尾兜底 DIRECT/REJECT)
custom_proxy_group=🧩 Clean`select`^(?!(?i)cf - |.*(?:官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)).*(?i)(US|🇺🇸|United States|美)`[]DIRECT`[]REJECT

; 5. CF自动组 (专属隔离区，仅抓取以 "cf - " 开头的节点)
custom_proxy_group=⚡ CF自动`url-test`^(?i)cf - `http://www.gstatic.com/generate_204`900`100


; ---------------------------------------------------
; [中层] 业务逻辑与全局主控 (通过组合底层分组来实现智能调度)
; ---------------------------------------------------
; 6. 流量自动组 (Fallback 容灾逻辑，按顺位连通即用，适合大流量下载)
custom_proxy_group=⚡ 流量自动`fallback`[]⚡ CF自动`[]🐸 青蛙`[]🧩 速度`[]🇺🇸 US`http://www.gstatic.com/generate_204`900

; 7. 流量手动组 (彻底纯净的调度容器，仅包含策略组，无散落节点)
custom_proxy_group=🛜 流量`select`[]⚡ 流量自动`[]⚡ CF自动`[]🐸 青蛙`[]🧩 速度`[]🇺🇸 US

; 8. 全局自动选择组 (全节点 url-test 测速择优，严格过滤 "cf - " 及无效节点)
custom_proxy_group=⚡ 自动选择`url-test`^(?!(?i)cf - |.*(?:官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)).*`http://www.gstatic.com/generate_204`900`100

; 9. 自定路由组 (用于特殊域名的灵活指向)
custom_proxy_group=🎯 自定路由`select`[]🚀 节点选择`[]🇺🇸 US`[]🧩 速度`[]DIRECT`[]REJECT

; 10. 节点选择组 (全局主控：包含大部分中底层组和常规节点，严格过滤 "cf - ")
custom_proxy_group=🚀 节点选择`select`[]⚡ 自动选择`[]🇺🇸 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean`[]DIRECT`[]REJECT`^(?!(?i)cf - |.*(?:官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)).*


; ---------------------------------------------------
; [顶层] 应用规则路由 (面向用户的控制面板，高度精细化分流)
; ---------------------------------------------------
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

; --- 海外核心与 AI 服务 (高隐蔽、高质量要求) ---
custom_proxy_group=✨ Gemini`select`[]🚀 节点选择`[]⚡ 自动选择`[]🇺🇸 US`[]🛜 流量`[]🧩 速度`[]🧩 Clean
