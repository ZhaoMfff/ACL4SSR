; ===================================================================
; 2. 策略组定义 (Proxy Groups) - 三层架构设计
; ===================================================================

; ---------------------------------------------------
; [底层] 节点筛选与测试
; ---------------------------------------------------
custom_proxy_group=🇺🇸 US`select`(?i)(US|United States|美|America)
custom_proxy_group=🐸 青蛙`url-test`(?i)FL-frog`http://www.gstatic.com/generate_204`900,,100
custom_proxy_group=🧩 速度`select`^(?!(?i)cf - |.*(?:官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)).*
custom_proxy_group=🧩 Clean`select`^(?!(?i)cf - |.*(?:官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)).*(?i)(US|United States|美|America)`[]DIRECT`[]REJECT
custom_proxy_group=⚡ CF自动`url-test`^(?i)cf - `http://www.gstatic.com/generate_204`900,,100

; ---------------------------------------------------
; [中层] 业务逻辑与全局主控
; ---------------------------------------------------
custom_proxy_group=⚡ 流量自动`fallback`[]⚡ CF自动`[]🐸 青蛙`[]🧩 速度`[]🇺🇸 US`http://www.gstatic.com/generate_204`900
custom_proxy_group=🛜 流量`select`[]⚡ 流量自动`[]⚡ CF自动`[]🐸 青蛙`[]🧩 速度`[]🇺🇸 US
custom_proxy_group=⚡ 自动选择`url-test`^(?!(?i)cf - |.*(?:官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)).*`http://www.gstatic.com/generate_204`900,,100
custom_proxy_group=🎯 自定路由`select`[]🚀 节点选择`[]🇺🇸 US`[]🧩 速度`[]DIRECT`[]REJECT
custom_proxy_group=🚀 节点选择`select`[]🇺🇸 US`[]⚡ 自动选择`[]🧩 速度`[]🛜 流量`[]🧩 Clean`[]DIRECT`[]REJECT`^(?!(?i)cf - |.*(?:官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)).*

; ---------------------------------------------------
; [顶层] 应用规则路由 (高自由度精细分流，顺序高度统一)
; 基础顺序：节点选择 -> US -> 自动选择 -> 流量 -> 速度 -> Clean -> 备用直连
; ---------------------------------------------------
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

; --- 海外核心与 AI 服务 ---
custom_proxy_group=✨ Gemini`select`[]🚀 节点选择`[]🇺🇸 US`[]⚡ 自动选择`[]🛜 流量`[]🧩 速度`[]🧩 Clean
custom_proxy_group=🤖 AI 服务`select`[]🚀 节点选择`[]🇺🇸 US`[]⚡ 自动选择`[]🛜 流量`[]🧩 速度`[]🧩 Clean
