[custom]
; ================= 1. 规则集定义 (Rulesets) =================
; 采用 ACL4SSR 经典远端规则 + 个人注入直连/自定规则

; 【直连白名单 & 内网】 (直接走系统内置 DIRECT 策略，彻底避开 Emoji Bug)
ruleset=DIRECT,[]DOMAIN-SUFFIX,cmbchina.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,icbc.com.cn
ruleset=DIRECT,[]DOMAIN-KEYWORD,alipay
ruleset=DIRECT,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve

; 【自定路由】 (指向纯英文命名的 Custom 分组，防解析丢失)
ruleset=Custom,[]DOMAIN-SUFFIX,linux.do
ruleset=Custom,[]DOMAIN-SUFFIX,v2ex.com
ruleset=Custom,[]DOMAIN-SUFFIX,serv00.net
ruleset=Custom,[]DOMAIN-SUFFIX,serv00.com

; 【开发代理池】 (指向纯英文命名的 Code 分组，手机端遇到会自动忽略进程名)
ruleset=Code,[]DOMAIN-SUFFIX,registry.npmjs.org
ruleset=Code,[]DOMAIN-SUFFIX,npmjs.org
ruleset=Code,[]DOMAIN-SUFFIX,nodejs.org
ruleset=Code,[]DOMAIN-SUFFIX,pypi.org
ruleset=Code,[]DOMAIN-SUFFIX,pythonhosted.org
ruleset=Code,[]DOMAIN-SUFFIX,files.pythonhosted.org
ruleset=Code,[]DOMAIN-SUFFIX,proxy.golang.org
ruleset=Code,[]DOMAIN-SUFFIX,sum.golang.org
ruleset=Code,[]DOMAIN-SUFFIX,go.dev
ruleset=Code,[]DOMAIN-SUFFIX,golang.org
ruleset=Code,[]DOMAIN-SUFFIX,docker.io
ruleset=Code,[]DOMAIN-SUFFIX,registry-1.docker.io
ruleset=Code,[]DOMAIN-SUFFIX,auth.docker.io
ruleset=Code,[]DOMAIN-SUFFIX,ghcr.io
ruleset=Code,[]DOMAIN-SUFFIX,quay.io
ruleset=Code,[]DOMAIN-SUFFIX,mcr.microsoft.com
ruleset=Code,[]PROCESS-NAME,language_server_windows_x64.exe
ruleset=Code,[]PROCESS-NAME,Antigravity.exe

; 【零碎拦截与路由】
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=Custom,[]DOMAIN,anyrouter.top
ruleset=DIRECT,[]DOMAIN,api.zscc.in
ruleset=Custom,[]DOMAIN,zscc.in
ruleset=Custom,[]DOMAIN,o.zscc.in
ruleset=Custom,[]DOMAIN-SUFFIX,antigravity-unleash.goog

; 【主流分流引入 (ACL4SSR源，使用远端列表不触发 Bug)】
ruleset=✨ Gemini,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleGemini.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Claude.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=☁️ 云服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Cloudflare.list
ruleset=🔍 谷歌服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=🏠 私有网络,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🔒 国内服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🔒 国内服务,[]GEOIP,CN
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🐦 推特/X,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Twitter.list
ruleset=💬 其他社交,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list
ruleset=🎮 Steam,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Steam.list
ruleset=🖥️ PC 游戏,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Epic.list
ruleset=🛠️ 开发工具,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Github.list
ruleset=💾 网盘存储,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=🛒 海淘购物,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Amazon.list
ruleset=🍵 休闲养生,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Porn.list
ruleset=🌍 非中国,[]GEOIP,!CN

ruleset=🐟 漏网之鱼,[]FINAL

; ================= 2. 策略组定义 (Proxy Groups) =================
; 【核心池提取】
; 提取青蛙节点 (用于容灾兜底第一层)
custom_proxy_group=🐸 青蛙节点`url-test`(?i)FL-frog`http://www.gstatic.com/generate_204`300,,50
; 提取 CF 节点 (正则前缀匹配)
custom_proxy_group=⚡ CF自动`url-test`(?i)^cf`http://www.gstatic.com/generate_204`300,,50
; US 节点
custom_proxy_group=🧩 US`select`(?i)(US|🇺🇸|United States|美|America)

; 【常规速度组与自动组】
custom_proxy_group=🧩 速度`select`.*``````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)
custom_proxy_group=⚡ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50`(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 【你的自定义多级嵌套】
custom_proxy_group=⚡ 流量自动`fallback`[]🐸 青蛙节点`[]⚡ CF自动`[]🧩 速度`[]🧩 US`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🛜 流量`select`[]⚡ 流量自动`[]⚡ CF自动`[]🧩 速度`.*``````(?i)(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 高优手动层 (纯英文命名避开解析错误，US 置顶)
custom_proxy_group=Custom`select`[]🧩 US`[]DIRECT`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 速度`[]🛜 流量`.*``````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)
custom_proxy_group=🧩 Clean`select`[]🧩 US`[]DIRECT`[]REJECT`(?i)(US|🇺🇸|United States|美)
custom_proxy_group=🚀 节点选择`select`[]🧩 US`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 速度`[]🛜 流量`[]🧩 Clean`.*``````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 功能性屏蔽与特供层 (Code 使用纯英文)
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT`[]🚀 节点选择
custom_proxy_group=Code`select`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🚀 节点选择`(?i)(US|🇺🇸|United States|美|America)

; 【海量服务组 (全部使用标准排序)】
custom_proxy_group=✨ Gemini`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🤖 AI 服务`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🔍 谷歌服务`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=Ⓜ️ 微软服务`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=☁️ 云服务`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🐦 推特/X`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=💬 其他社交`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🎮 Steam`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🖥️ PC 游戏`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🛠️ 开发工具`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=💾 网盘存储`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🛒 海淘购物`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🍵 休闲养生`select`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量

custom_proxy_group=🏠 私有网络`select`[]DIRECT`[]REJECT`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🔒 国内服务`select`[]DIRECT`[]REJECT`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🌍 非中国`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 Clean`[]🧩 速度`[]🛜 流量

; 开启覆写
enable_rule_generator=true
overwrite_original_rules=true
