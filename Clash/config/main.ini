; ================= 2. 策略组定义 (Proxy Groups) =================

; —————— 底层：节点筛选与自动测试 ——————
; 1. US 组 (地区筛选)
custom_proxy_group=🇺🇸 US`select`(?i)(US|🇺🇸|United States|美|America)

; 2. 青蛙节点 (自动测速)
custom_proxy_group=🐸 青蛙`url-test`(?i)FL-frog`http://www.gstatic.com/generate_204`900`100

; 3. CF自动组 (自动测速)
custom_proxy_group=⚡ CF自动`url-test`(?i)^cf`http://www.gstatic.com/generate_204`900`100

; 4. 速度组 (纯节点列表，排除特定词汇)
custom_proxy_group=🧩 速度`select`.*``````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 5. Clean 组 (纯净美国节点)
custom_proxy_group=🧩 Clean`select`[]🇺🇸 US`[]DIRECT`[]REJECT`(?i)(US|🇺🇸|United States|美)``````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 6. 全局自动选择组 (全节点自动测速)
custom_proxy_group=⚡ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`900`100`(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)


; —————— 中层：业务逻辑与主控节点选择 ——————
; 7. 流量自动组 (Fallback 逻辑，按顺序可用即连)
custom_proxy_group=⚡ 流量自动`fallback`[]⚡ CF自动`[]🐸 青蛙`[]🧩 速度`[]🇺🇸 US`http://www.gstatic.com/generate_204`900

; 8. 流量手动组 (聚合流量策略与节点)
custom_proxy_group=🛜 流量`select`[]⚡ 流量自动`[]⚡ CF自动`[]🧩 速度`.*``````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 9. 🚀 节点选择 (全局主控：包含大部分中底层组和所有常规节点)
custom_proxy_group=🚀 节点选择`select`[]⚡ 自动选择`[]🇺🇸 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean`[]DIRECT`[]REJECT`.*``````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 10. 🎯 自定路由组 (交由节点选择组或直连处理)
custom_proxy_group=🎯 自定路由`select`[]🚀 节点选择`[]🇺🇸 US`[]DIRECT`[]REJECT


; —————— 顶层：应用规则路由 (高自由度精细分流版) ——————
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

