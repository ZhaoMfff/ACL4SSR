[custom]
; ================= 1. 规则集定义 (Rulesets) =================
; 整合了你之前要求的自定义规则和 ACL4SSR 远端列表

; 【内网/直连防断流】
ruleset=DIRECT,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve

; 【自定路由】 - 对应 JS 脚本中的 myCustomRules
ruleset=🎯 自定路由,[]DOMAIN-SUFFIX,linux.do
ruleset=🎯 自定路由,[]DOMAIN-SUFFIX,v2ex.com
ruleset=🎯 自定路由,[]DOMAIN-SUFFIX,serv00.net
ruleset=🎯 自定路由,[]DOMAIN-SUFFIX,serv00.com

; 【开发代理】 - 对应 JS 脚本中的 myDevProxyRules
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,registry.npmjs.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,npmjs.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,nodejs.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,pypi.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,pythonhosted.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,files.pythonhosted.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,proxy.golang.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,sum.golang.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,go.dev
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,golang.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,docker.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,registry-1.docker.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,auth.docker.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,ghcr.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,quay.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,mcr.microsoft.com

; 【核心路由逻辑】
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,antigravity-unleash.goog
ruleset=🚀 节点选择,[]DOMAIN,anyrouter.top
ruleset=🔒 国内服务,[]DOMAIN,api.zscc.in
ruleset=🚀 节点选择,[]DOMAIN,zscc.in
ruleset=🚀 节点选择,[]DOMAIN,o.zscc.in
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list

; 【分类分流规则】
ruleset=✨ Gemini,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleGemini.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Claude.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=☁️ 云服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Cloudflare.list
ruleset=🔍 谷歌服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🐦 推特/X,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Twitter.list
ruleset=💬 其他社交,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list
ruleset=🎮 Steam,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Steam.list
ruleset=🛠️ 开发工具,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Github.list
ruleset=💾 网盘存储,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=🛒 海淘购物,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Amazon.list
ruleset=🍵 休闲养生,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Porn.list

; 【兜底规则】
ruleset=🏠 私有网络,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🔒 国内服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🔒 国内服务,[]GEOIP,CN
ruleset=🌍 非中国,[]GEOIP,!CN
ruleset=🐟 漏网之鱼,[]FINAL

; ================= 2. 策略组定义 (Proxy Groups) =================
; 严格遵循 JS 脚本中的顺序和逻辑

; 1. US 组：移除直连/拒绝，纯节点
custom_proxy_group=🧩 US`select`(?i)US|🇺🇸|United States|美|America

; 2. 速度组：手动选择 (select)，包含常用节点
custom_proxy_group=🧩 速度`select`(?i)HK|🇭🇰|Hong Kong|港|US|🇺🇸|America|.*``````(?i)官网|到期|剩余|Game|Traffic|重置|备用|0\.

; 3. CF自动组：科学匹配前缀节点
custom_proxy_group=⚡ CF自动`url-test`(?i)^cf`http://www.gstatic.com/generate_204`300,,50

; 4. 流量自动组 (容灾层)：青蛙优先 > CF自动 > 速度 > US
custom_proxy_group=🐸 青蛙节点`url-test`(?i)FL-frog`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=⚡ 流量自动`fallback`[]🐸 青蛙节点`[]⚡ CF自动`[]🧩 速度`[]🧩 US`http://www.gstatic.com/generate_204`300,,50

; 5. 流量手动组
custom_proxy_group=🛜 流量`select`[]⚡ 流量自动`[]⚡ CF自动`[]🧩 速度`.*``````(?i)官网|到期|剩余|Game|Traffic|重置|备用|0\.

; 6. 自定路由组：US 置顶
custom_proxy_group=🎯 自定路由`select`[]🧩 US`[]DIRECT`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 速度`[]🛜 流量`.*

; 7. Clean 组
custom_proxy_group=🧩 Clean`select`[]🧩 US`[]DIRECT`[]REJECT`(?i)US|🇺🇸|America|Clean

; 8. 节点选择组：US 分组放在最前面
custom_proxy_group=🚀 节点选择`select`[]🧩 US`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 速度`[]🛜 流量`[]🧩 Clean`.*``````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.)

; 9. 自动选择组
custom_proxy_group=⚡ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50`(?i)官网|到期|剩余|Game|Traffic|重置|备用|0\.

; 10. 广告拦截
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT`[]🚀 节点选择

; 11. 功能性分组 - 遵循标准代理池顺序
custom_proxy_group=✨ Gemini`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=🤖 AI 服务`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=🔍 谷歌服务`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=Ⓜ️ 微软服务`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=🐦 推特/X`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=💬 其他社交`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=🎮 Steam`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=🖥️ PC 游戏`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=🛠️ 开发工具`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=💾 网盘存储`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=🛒 海淘购物`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean
custom_proxy_group=🍵 休闲养生`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量`[]🧩 Clean

; 12. 兜底与国内
custom_proxy_group=🏠 私有网络`select`[]DIRECT`[]REJECT`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 速度`[]🛜 流量
custom_proxy_group=🔒 国内服务`select`[]DIRECT`[]REJECT`[]🚀 节点选择`[]⚡ 自动选择`[]🧩 US`[]🧩 速度`[]🛜 流量
custom_proxy_group=🌍 非中国`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]⚡ 自动选择`[]DIRECT`[]REJECT`[]🧩 US`[]🧩 速度`[]🛜 流量

; ================= 3. 兼容性与修正 =================
; 如果转换器仍然抽风找“全球直连”，我们做一个指向 DIRECT 的别名
custom_proxy_group=🎯 全球直连`select`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
