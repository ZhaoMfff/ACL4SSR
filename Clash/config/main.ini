[custom]
; ================= 1. 规则集定义 (Rulesets) =================

; 【内网直连防断流】
ruleset=DIRECT,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve

; 【自定路由】
ruleset=Custom,[]DOMAIN-SUFFIX,linux.do
ruleset=Custom,[]DOMAIN-SUFFIX,v2ex.com
ruleset=Custom,[]DOMAIN-SUFFIX,serv00.net
ruleset=Custom,[]DOMAIN-SUFFIX,serv00.com

; 【开发代理池】
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,registry.npmjs.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,npmjs.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,nodejs.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,pypi.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,pythonhosted.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,files.pythonhosted.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,proxy.golang.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,sum.golang.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,go.dev
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,golang.org
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,docker.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,registry-1.docker.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,auth.docker.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,ghcr.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,quay.io
ruleset=🛠️ 开发工具,[]DOMAIN-SUFFIX,mcr.microsoft.com

; 【零碎拦截与路由】
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=Custom,[]DOMAIN,anyrouter.top
ruleset=DIRECT,[]DOMAIN,api.zscc.in
ruleset=Custom,[]DOMAIN,zscc.in
ruleset=Custom,[]DOMAIN,o.zscc.in
ruleset=Custom,[]DOMAIN-SUFFIX,antigravity-unleash.goog

; 【主流分流引入 (ACL4SSR远端源)】
ruleset=✨ Gemini,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleGemini.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Claude.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🌩️ 云端服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Cloudflare.list
ruleset=🔍 谷歌服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=🏠 私有网络,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🔒 国内服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🔒 国内服务,[]GEOIP,CN
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🐦 推特/X,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Twitter.list
ruleset=💬 其他社交,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list
ruleset=🛠️ 开发工具,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Github.list
ruleset=💾 网盘存储,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=🛒 海淘购物,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Amazon.list
ruleset=🍵 休闲养生,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Porn.list
ruleset=🌍 非中国,[]GEOIP,!CN
ruleset=🐟 漏网之鱼,[]FINAL


; ================= 2. 策略组定义 (Proxy Groups) =================

; 1. US 组
custom_proxy_group=US分组`select`(?i)(US|🇺🇸|United States|美|America)

; 2. 速度组
custom_proxy_group=速度分组`select`.*````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 3. 青蛙节点提取
custom_proxy_group=青蛙`url-test`(?i)FL-frog`http://www.gstatic.com/generate_204`300,,50

; 4. CF自动组
custom_proxy_group=☁️ CF自动`url-test`(?i)^cf`http://www.gstatic.com/generate_204`300,,50

; 5. 流量自动组 (容灾降级：CF自动优先 > 青蛙 > 速度分组 > US分组)
custom_proxy_group=🔁 流量自动`fallback`[]☁️ CF自动`[]青蛙`[]速度分组`[]US分组`[http://www.gstatic.com/generate_204](http://www.gstatic.com/generate_204)`300,,50

; 6. 流量手动组
custom_proxy_group=🛜 流量控制`select`[]🔁 流量自动`[]☁️ CF自动`[]速度分组`.*````(?i)(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 7. 自定路由组 (US分组 置顶)
custom_proxy_group=Custom`select`[]US分组`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择`[]速度分组`[]🛜 流量控制`.*````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 8. Clean 组
custom_proxy_group=🧹 规则净化`select`[]US分组`[]DIRECT`[]REJECT`(?i)(US|🇺🇸|United States|美)

; 9. 节点选择组 (US分组 置顶)
custom_proxy_group=🚀 节点选择`select`[]US分组`[]♻️ 自动选择`[]DIRECT`[]REJECT`[]速度分组`[]🛜 流量控制`[]🧹 规则净化`.*````(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 10. 全局自动选择组
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50`(?i)^cf|(官网|到期|剩余|Game|Traffic|重置|备用|0\.|网站|地址)

; 11. 广告拦截组
custom_proxy_group=🛡️ 广告拦截`select`[]REJECT`[]DIRECT`[]🚀 节点选择

; 12. 功能服务组
custom_proxy_group=✨ Gemini`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🤖 AI 服务`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🔍 谷歌服务`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=Ⓜ️ 微软服务`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🌩️ 云端服务`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🐦 推特/X`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=💬 其他社交`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🛠️ 开发工具`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=💾 网盘存储`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🛒 海淘购物`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🍵 休闲养生`select`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制

; 13. 兜底与国内组
custom_proxy_group=🏠 私有网络`select`[]DIRECT`[]REJECT`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🔒 国内服务`select`[]DIRECT`[]REJECT`[]🚀 节点选择`[]♻️ 自动选择`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🌍 非中国`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`[]REJECT`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`[]REJECT`[]US分组`[]🧹 规则净化`[]速度分组`[]🛜 流量控制

; ================= 3. 幽灵兜底组 (Polyfill) 防崩区域 =================
custom_proxy_group=全球直连`select`[]DIRECT
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=节点选择`select`[]🚀 节点选择
custom_proxy_group=自动选择`select`[]♻️ 自动选择
custom_proxy_group=广告拦截`select`[]REJECT
custom_proxy_group=漏网之鱼`select`[]🐟 漏网之鱼

enable_rule_generator=true
overwrite_original_rules=true
